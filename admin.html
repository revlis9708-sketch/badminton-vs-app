<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>管理画面 🏸</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'DM Sans',sans-serif;background:#f5f5f5;color:#111;min-height:100vh}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#fff;border-radius:14px;padding:24px;box-shadow:0 2px 16px rgba(0,0,0,.08);width:100%;max-width:420px}
.logo{text-align:center;font-size:36px;margin-bottom:8px}
.title{text-align:center;font-size:18px;font-weight:700;margin-bottom:20px}
input,select{border:1.5px solid #ddd;border-radius:8px;padding:10px 12px;font-size:14px;width:100%;outline:none;font-family:inherit}
input:focus{border-color:#F26A1B}
.btn{border:none;border-radius:8px;padding:11px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-ora{background:#F26A1B;color:#fff;width:100%}
.btn-red{background:#e74c3c;color:#fff}
.btn-green{background:#27ae60;color:#fff}
.btn-gray{background:#eee;color:#666}
.btn-sm{padding:6px 12px;font-size:12px}
.err{color:#c0392b;font-size:12px;text-align:center;margin-top:8px;min-height:18px}

/* Admin layout */
.admin-wrap{width:100%;padding:8px 0}
.topbar{background:#fff;border-bottom:1px solid #eee;padding:12px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-title{font-size:16px;font-weight:700}
.section{background:#fff;border-radius:0;padding:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.section-title{font-size:14px;font-weight:700;color:#888;letter-spacing:.5px;margin-bottom:14px;text-transform:uppercase}
.form-row{display:flex;gap:8px;margin-bottom:10px}
.form-row input{flex:1}
.table{width:100%;border-collapse:collapse;font-size:13px}
.table th{text-align:left;padding:8px 10px;border-bottom:2px solid #f0f0f0;color:#888;font-size:12px;font-weight:600}
.table td{padding:10px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
.table tr:last-child td{border-bottom:none}

/* Toggle switch */
.toggle-wrap{display:flex;align-items:center;gap:6px;cursor:pointer}
.toggle{position:relative;width:42px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:#ddd;border-radius:24px;transition:.2s}
.toggle-slider:before{content:'';position:absolute;height:18px;width:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider{background:#27ae60}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px)}
.toggle-label{font-size:11px;font-weight:600;color:#888;min-width:24px}

/* Table full width */
.table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
.table th{text-align:left;padding:8px 6px;border-bottom:2px solid #f0f0f0;color:#888;font-size:11px;font-weight:600;white-space:nowrap}
.table td{padding:10px 6px;border-bottom:1px solid #f5f5f5;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.table tr:last-child td{border-bottom:none}
.col-name{width:28%}
.col-toggle{width:18%}
.col-date{width:22%}
.col-phone{width:32%}

@media(max-width:600px){
  .table th,.table td{padding:10px 4px;font-size:12px}
  .col-name{width:26%}
  .col-toggle{width:20%}
  .col-date{width:22%}
  .col-phone{width:32%}
}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
.badge-on{background:#e8f8ee;color:#27ae60}
.badge-off{background:#fde;color:#e74c3c}
.loading{text-align:center;padding:40px;color:#aaa;font-size:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:600;opacity:0;transition:opacity .2s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
.tab-bar{display:flex;gap:8px;margin-bottom:16px}
.tab-btn{padding:8px 18px;border-radius:20px;border:1.5px solid #ddd;background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.tab-btn.on{background:#F26A1B;color:#fff;border-color:#F26A1B}
.search{margin-bottom:12px}
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- LOGIN -->
<div id="login-screen" class="login-wrap">
  <div class="card">
    <div class="logo">🏸</div>
    <div class="title">管理画面ログイン</div>
    <input type="password" id="admin-pw" placeholder="管理者パスワード"
      onkeydown="if(event.key==='Enter')checkPw()">
    <div class="err" id="pw-err"></div>
    <br>
    <button class="btn btn-ora" onclick="checkPw()">ログイン</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen" style="display:none">
  <div class="topbar">
    <div class="topbar-title">🏸 管理画面</div>
    <button class="btn btn-gray btn-sm" onclick="adminLogout()">ログアウト</button>
  </div>

  <div class="admin-wrap">

    <!-- Add buyer -->
    <div class="section">
      <div class="section-title">購入者を追加</div>
      <div class="form-row">
        <input type="text" id="add-name" placeholder="名前（例：山田太郎）">
        <input type="tel" id="add-phone" placeholder="電話番号（ハイフンなし）">
      </div>
      <button class="btn btn-ora" onclick="addBuyer()">追加する</button>
      <div class="err" id="add-err"></div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar" style="padding:0 12px">
      <button class="tab-btn on" id="tab-buyers" onclick="switchTab('buyers')">購入者一覧</button>
      <button class="tab-btn" id="tab-active" onclick="switchTab('active')">アクティブ</button>
      <button class="tab-btn" id="tab-inactive" onclick="switchTab('inactive')">非アクティブ</button>
    </div>

    <!-- Stats bar -->
    <div id="stats-bar" style="padding:6px 12px;font-size:13px;color:#666;margin-bottom:4px"></div>

    <!-- Buyers list -->
    <div id="pane-buyers" class="section">
      <div class="section-title">購入者一覧</div>
      <div class="search">
        <input type="text" id="buyer-search" placeholder="名前・電話番号で検索..." oninput="renderBuyers()">
      </div>
      <div id="buyers-list" class="loading">読み込み中...</div>
    </div>

    <!-- Active users list -->
    <div id="pane-active" class="section" style="display:none">
      <div class="section-title">アクティブユーザー</div>
      <div class="search">
        <input type="text" id="active-search" placeholder="名前・電話番号で検索..." oninput="renderProfiles()">
      </div>
      <div id="profiles-list" class="loading">読み込み中...</div>
    </div>

    <!-- Inactive users list -->
    <div id="pane-inactive" class="section" style="display:none">
      <div class="section-title">非アクティブユーザー</div>
      <div class="search">
        <input type="text" id="inactive-search" placeholder="名前・電話番号で検索..." oninput="renderInactive()">
      </div>
      <div id="inactive-list" class="loading">読み込み中...</div>
    </div>

  </div>
</div>

<script>
const SUPABASE_URL='https://frmbdsmhcdfglkbynteu.supabase.co';
const SUPABASE_KEY='sb_publishable_5n4MzBgkg-B9-VUrLcjh8A_3JavCe8E';
const ADMIN_PW='badminton_admin_2024'; // ← ここを変更してください
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let allBuyers=[];
let allProfiles=[];
let currentTab='buyers';

function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

function checkPw(){
  const pw=document.getElementById('admin-pw').value;
  if(pw===ADMIN_PW){
    localStorage.setItem('_admin_auth','1');
    showAdmin();
  } else {
    document.getElementById('pw-err').textContent='パスワードが違います';
  }
}

function showAdmin(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('admin-screen').style.display='block';
  loadAll();
}

function adminLogout(){
  localStorage.removeItem('_admin_auth');
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('admin-screen').style.display='none';
  document.getElementById('admin-pw').value='';
}

// Auto-login if already authenticated
if(localStorage.getItem('_admin_auth')==='1'){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('admin-screen').style.display='block';
  loadAll();
}

function switchTab(tab){
  currentTab=tab;
  ['buyers','active','inactive'].forEach(t=>{
    document.getElementById(`pane-${t}`).style.display=tab===t?'block':'none';
    document.getElementById(`tab-${t}`).classList.toggle('on',tab===t);
  });
}

async function loadAll(){
  const[{data:buyers},{data:profiles}]=await Promise.all([
    sb.from('buyers').select('*').order('purchased_at',{ascending:false}),
    sb.from('profiles').select('*').order('created_at',{ascending:false}),
  ]);
  allBuyers=buyers||[];
  allProfiles=profiles||[];
  // Stats bar
  const activeCount=allProfiles.filter(p=>p.is_active).length;
  const buyerCount=allBuyers.length;
  document.getElementById('stats-bar').innerHTML=
    `アクティブユーザー <strong style="color:#F26A1B">${activeCount}</strong> / ${buyerCount} 人`;
  renderBuyers();
  renderProfiles();
  renderInactive();
}

function renderBuyers(){
  const q=(document.getElementById('buyer-search')?.value||'').toLowerCase();
  const list=allBuyers.filter(b=>b.name.toLowerCase().includes(q)||b.phone.includes(q));
  const el=document.getElementById('buyers-list');
  if(!list.length){el.innerHTML='<div style="text-align:center;padding:20px;color:#aaa">データなし</div>';return;}
  el.innerHTML=`<table class="table">
    <thead><tr>
      <th class="col-name">名前</th>
      <th class="col-toggle">状態</th>
      <th class="col-date">登録日</th>
      <th class="col-phone">電話番号</th>
    </tr></thead>
    <tbody>${list.map(b=>`<tr>
      <td class="col-name">
        <strong>${b.name}</strong>
        <button class="btn btn-sm btn-gray" style="font-size:10px;padding:2px 8px;margin-top:3px;display:block" onclick="deleteBuyer('${b.id}','${b.name.replace(/'/g,"\\'")}')">削除</button>
      </td>
      <td class="col-toggle">
        <label class="toggle-wrap" onclick="toggleBuyer('${b.id}',${b.is_active})">
          <span class="toggle"><input type="checkbox" ${b.is_active?'checked':''} onclick="event.preventDefault()"><span class="toggle-slider"></span></span>
        </label>
      </td>
      <td class="col-date" style="color:#aaa;font-size:11px">${b.purchased_at?new Date(b.purchased_at).toLocaleDateString('ja-JP'):''}</td>
      <td class="col-phone" style="color:#666">${b.phone}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}

function renderProfiles(){
  const q=(document.getElementById('active-search')?.value||'').toLowerCase();
  const list=allProfiles.filter(p=>p.is_active&&((p.name||'').toLowerCase().includes(q)||(p.phone||'').includes(q)));
  const el=document.getElementById('profiles-list');
  if(!list.length){el.innerHTML='<div style="text-align:center;padding:20px;color:#aaa">データなし</div>';return;}
  el.innerHTML=buildProfileTable(list);
}

function renderInactive(){
  const q=(document.getElementById('inactive-search')?.value||'').toLowerCase();
  // Non-active = buyers who haven't registered (no profile) OR profiles that are inactive
  const registeredPhones=new Set(allProfiles.map(p=>p.phone));
  const unusedBuyers=allBuyers.filter(b=>!registeredPhones.has(b.phone)&&((b.name||'').toLowerCase().includes(q)||(b.phone||'').includes(q)));
  const inactiveProfiles=allProfiles.filter(p=>!p.is_active&&((p.name||'').toLowerCase().includes(q)||(p.phone||'').includes(q)));

  const el=document.getElementById('inactive-list');
  if(!el)return;
  if(!unusedBuyers.length&&!inactiveProfiles.length){
    el.innerHTML='<div style="text-align:center;padding:20px;color:#aaa">データなし</div>';return;
  }

  const unusedRows=unusedBuyers.map(b=>`<tr>
    <td class="col-name">
      <div style="font-weight:700">${b.name}</div>
      <div style="font-size:10px;color:#e67e22;font-weight:600;margin-top:2px">未使用</div>
    </td>
    <td class="col-toggle"><span style="font-size:11px;color:#aaa">—</span></td>
    <td class="col-date" style="color:#aaa;font-size:11px">${b.purchased_at?new Date(b.purchased_at).toLocaleDateString('ja-JP'):''}</td>
    <td class="col-phone" style="color:#666">${b.phone}</td>
  </tr>`).join('');

  const suspendedRows=inactiveProfiles.map(p=>`<tr>
    <td class="col-name">
      <div style="font-weight:700">${p.name||'—'}</div>
      <div style="font-size:10px;color:#e74c3c;font-weight:600;margin-top:2px">停止中</div>
      <button class="btn btn-sm btn-gray" style="font-size:10px;padding:2px 8px;margin-top:3px" onclick="deleteProfile('${p.id}','${(p.name||'').replace(/'/g,"\\'")}')">削除</button>
    </td>
    <td class="col-toggle">
      <label class="toggle-wrap" onclick="toggleProfile('${p.id}',${p.is_active})">
        <span class="toggle"><input type="checkbox" ${p.is_active?'checked':''} onclick="event.preventDefault()"><span class="toggle-slider"></span></span>
      </label>
    </td>
    <td class="col-date" style="color:#aaa;font-size:11px">${p.created_at?new Date(p.created_at).toLocaleDateString('ja-JP'):''}</td>
    <td class="col-phone" style="color:#666">${p.phone||'—'}</td>
  </tr>`).join('');

  el.innerHTML=`<table class="table">
    <thead><tr>
      <th class="col-name">名前</th>
      <th class="col-toggle">状態</th>
      <th class="col-date">登録日</th>
      <th class="col-phone">電話番号</th>
    </tr></thead>
    <tbody>${unusedRows}${suspendedRows}</tbody>
  </table>`;
}

function buildProfileTable(list){
  return`<table class="table">
    <thead><tr>
      <th class="col-name">名前</th>
      <th class="col-toggle">状態</th>
      <th class="col-date">登録日</th>
      <th class="col-phone">電話番号</th>
    </tr></thead>
    <tbody>${list.map(p=>`<tr>
      <td class="col-name">
        <div style="font-weight:700">${p.name||'—'}</div>
        <button class="btn btn-sm btn-gray" style="font-size:10px;padding:2px 8px;margin-top:3px" onclick="deleteProfile('${p.id}','${(p.name||'').replace(/'/g,"\\'")}')">削除</button>
      </td>
      <td class="col-toggle">
        <label class="toggle-wrap" onclick="toggleProfile('${p.id}',${p.is_active})">
          <span class="toggle"><input type="checkbox" ${p.is_active?'checked':''} onclick="event.preventDefault()"><span class="toggle-slider"></span></span>
        </label>
      </td>
      <td class="col-date" style="color:#aaa;font-size:11px">${p.created_at?new Date(p.created_at).toLocaleDateString('ja-JP'):''}</td>
      <td class="col-phone" style="color:#666">${p.phone||'—'}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}

async function addBuyer(){
  const name=document.getElementById('add-name').value.trim();
  const phone=document.getElementById('add-phone').value.replace(/[-\s]/g,'').trim();
  const errEl=document.getElementById('add-err');
  errEl.textContent='';
  if(!name||!phone){errEl.textContent='名前と電話番号を入力してください';return;}
  const btn=event.target;btn.disabled=true;btn.textContent='追加中...';
  const{error}=await sb.from('buyers').insert({name,phone,is_active:true});
  btn.disabled=false;btn.textContent='追加する';
  if(error){
    errEl.textContent=error.message.includes('unique')?'この電話番号はすでに登録されています':'追加に失敗しました';
    return;
  }
  document.getElementById('add-name').value='';
  document.getElementById('add-phone').value='';
  showToast(`✓ ${name} を追加しました`);
  await loadAll();
}

async function deleteBuyer(id,name){
  // Delete linked profiles first, then buyer
  const{error:pe}=await sb.from('profiles').delete().eq('buyer_id',id);
  const{error:be}=await sb.from('buyers').delete().eq('id',id);
  if(be){showToast('削除に失敗しました');return;}
  // Remove from local array immediately
  allBuyers=allBuyers.filter(b=>b.id!==id);
  allProfiles=allProfiles.filter(p=>p.buyer_id!==id);
  showToast(`✓ ${name} を削除しました`);
  // Update stats and re-render
  const activeCount=allProfiles.filter(p=>p.is_active).length;
  document.getElementById('stats-bar').innerHTML=
    `アクティブユーザー <strong style="color:#F26A1B">${activeCount}</strong> / ${allBuyers.length} 人`;
  renderBuyers();renderProfiles();renderInactive();
}

async function toggleBuyer(id,current){
  const{error}=await sb.from('buyers').update({is_active:!current}).eq('id',id);
  if(error){showToast('エラーが発生しました');return;}
  await sb.from('profiles').update({is_active:!current}).eq('buyer_id',id);
  showToast(current?'停止しました':'有効化しました');
  await loadAll();
}

async function deleteProfile(id,name){
  const{error}=await sb.from('profiles').delete().eq('id',id);
  if(error){showToast('削除に失敗しました');return;}
  showToast(`✓ ${name} のアカウントを削除しました`);
  await loadAll();
}

async function toggleProfile(id,current){
  const{error}=await sb.from('profiles').update({is_active:!current}).eq('id',id);
  if(error){showToast('エラーが発生しました');return;}
  showToast(current?'停止しました':'有効化しました');
  await loadAll();
}

// Enter key for password
document.getElementById('admin-pw').addEventListener('keydown',e=>{
  if(e.key==='Enter')checkPw();
});
</script>
</body>
</html>
